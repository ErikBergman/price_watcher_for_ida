name: Price Watcher

on:
  workflow_dispatch:
  schedule:
    - cron: "39 20 * * *"

jobs:
  watch-price:
    runs-on: ubuntu-latest
    outputs:
      parsed_price_field: ${{ steps.extract.outputs.parsed_price_field }}
      parsed_price_value: ${{ steps.extract.outputs.parsed_price_value }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run price watcher
        run: python watch_price.py | tee run.log

      - name: Extract parsed price
        id: extract
        shell: bash
        run: |
          field_line="$(grep -m1 -E 'parsed_price:\s*[^ ]' run.log | sed 's/^[[:space:]]*//')"
          if [[ -z "$field_line" ]]; then
            echo "No parsed_price field found in output."
            exit 1
          fi

          parsed_value="$(echo "$field_line" | cut -d':' -f2- | xargs)"
          echo "parsed_price_field=$field_line" >> "$GITHUB_OUTPUT"
          echo "parsed_price_value=$parsed_value" >> "$GITHUB_OUTPUT"

          {
            echo "## Price Watcher Result"
            echo ""
            echo "- Field: \`$field_line\`"
            echo "- Parsed value: \`$parsed_value\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Print extracted field
        run: |
          echo "Found field: ${{ steps.extract.outputs.parsed_price_field }}"
          echo "Parsed value: ${{ steps.extract.outputs.parsed_price_value }}"

      - name: Notify Telegram
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PARSED_PRICE_FIELD: ${{ steps.extract.outputs.parsed_price_field }}
          PARSED_PRICE_VALUE: ${{ steps.extract.outputs.parsed_price_value }}
          JOB_STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          if [[ -z "$TELEGRAM_BOT_TOKEN" || -z "$TELEGRAM_CHAT_ID" ]]; then
            echo "Skipping Telegram notification: TELEGRAM_BOT_TOKEN or TELEGRAM_CHAT_ID is missing."
            exit 0
          fi

          if [[ -z "$PARSED_PRICE_FIELD" ]]; then
            PARSED_PRICE_FIELD="parsed_price: <not found>"
          fi
          if [[ -z "$PARSED_PRICE_VALUE" ]]; then
            PARSED_PRICE_VALUE="<not found>"
          fi

          message=$'Price watcher run: '"$JOB_STATUS"$'\nRepo: ${{ github.repository }}'$'\n'"$PARSED_PRICE_FIELD"$'\nValue: '"$PARSED_PRICE_VALUE"$'\nRun: '"$RUN_URL"

          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${message}" > /dev/null
