name: Price Watcher

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/price-watcher.yml
      - watch_price.py
      - discover_selectors.py
      - requirements.txt
      - data/example.discount_watchers.json
  workflow_dispatch:
    inputs:
      watch_mode:
        description: Watch mode to run
        required: false
        default: discount
        type: choice
        options:
          - discount
          - price
  schedule:
    - cron: "0 19 * * *"

jobs:
  watch-price:
    runs-on: ubuntu-latest
    env:
      WATCH_MODE: ${{ inputs.watch_mode || vars.WATCH_MODE || 'discount' }}
    outputs:
      parsed_price_field: ${{ steps.extract.outputs.parsed_price_field }}
      parsed_price_value: ${{ steps.extract.outputs.parsed_price_value }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install rclone
        shell: bash
        run: |
          sudo -v
          curl https://rclone.org/install.sh | sudo bash

      - name: Debug Koofr paths
        env:
          KOOFR_EMAIL: ${{ secrets.KOOFR_EMAIL }}
          KOOFR_APP_PASSWORD: ${{ secrets.KOOFR_APP_PASSWORD }}
          KOOFR_PATH: ${{ secrets.KOOFR_PATH }}
        shell: bash
        run: |
          if [[ -z "$KOOFR_EMAIL" || -z "$KOOFR_APP_PASSWORD" || -z "$KOOFR_PATH" ]]; then
            echo "Missing Koofr secrets. Expected KOOFR_EMAIL, KOOFR_APP_PASSWORD, and KOOFR_PATH."
            exit 1
          fi

          mkdir -p ~/.config/rclone runtime_data
          obscured_password="$(rclone obscure "$KOOFR_APP_PASSWORD")"
          printf '[koofr]\ntype = koofr\nprovider = koofr\nuser = %s\npassword = %s\n' \
            "$KOOFR_EMAIL" "$obscured_password" > ~/.config/rclone/rclone.conf

          echo "Top level:"
          rclone lsd koofr:
          echo "Target folder:"
          rclone lsd "koofr:${KOOFR_PATH}"

      - name: Download runtime data from Koofr
        env:
          KOOFR_EMAIL: ${{ secrets.KOOFR_EMAIL }}
          KOOFR_APP_PASSWORD: ${{ secrets.KOOFR_APP_PASSWORD }}
          KOOFR_PATH: ${{ secrets.KOOFR_PATH }}
          WATCH_MODE: ${{ env.WATCH_MODE }}
        shell: bash
        run: |
          if [[ -z "$KOOFR_EMAIL" || -z "$KOOFR_APP_PASSWORD" || -z "$KOOFR_PATH" ]]; then
            echo "Missing Koofr secrets. Expected KOOFR_EMAIL, KOOFR_APP_PASSWORD, and KOOFR_PATH."
            exit 1
          fi

          mkdir -p runtime_data
          watch_mode="${WATCH_MODE:-discount}"
          if [[ "$watch_mode" == "discount" ]]; then
            if ! rclone copyto "koofr:${KOOFR_PATH}/discount_watchers.json" runtime_data/discount_watchers.json; then
              cp data/example.discount_watchers.json runtime_data/discount_watchers.json
            fi
            if ! rclone copyto "koofr:${KOOFR_PATH}/discount_memory.json" runtime_data/discount_memory.json; then
              printf '{}\n' > runtime_data/discount_memory.json
            fi
          else
            rclone copyto "koofr:${KOOFR_PATH}/links.csv" runtime_data/links.csv
            rclone copyto "koofr:${KOOFR_PATH}/site_selectors.json" runtime_data/site_selectors.json
            if ! rclone copyto "koofr:${KOOFR_PATH}/price_memory.json" runtime_data/price_memory.json; then
              printf '{}\n' > runtime_data/price_memory.json
            fi
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run watcher
        env:
          WATCH_MODE: ${{ env.WATCH_MODE }}
          LINKS_CSV_PATH: runtime_data/links.csv
          PRICE_STATE_PATH: runtime_data/price_memory.json
          SELECTOR_SCHEMA_PATH: runtime_data/site_selectors.json
          DISCOUNT_CONFIG_PATH: runtime_data/discount_watchers.json
          DISCOUNT_STATE_PATH: runtime_data/discount_memory.json
        run: python watch_price.py | tee run.log

      - name: Upload watcher memory to Koofr
        if: always()
        env:
          KOOFR_PATH: ${{ secrets.KOOFR_PATH }}
          WATCH_MODE: ${{ env.WATCH_MODE }}
        shell: bash
        run: |
          if [[ -z "$KOOFR_PATH" ]]; then
            echo "Skipping Koofr upload: KOOFR_PATH is missing."
            exit 0
          fi

          watch_mode="${WATCH_MODE:-discount}"
          if [[ "$watch_mode" == "discount" ]]; then
            if [[ ! -f runtime_data/discount_memory.json ]]; then
              echo "Skipping Koofr upload: runtime_data/discount_memory.json not found."
              exit 0
            fi

            rclone copyto runtime_data/discount_memory.json "koofr:${KOOFR_PATH}/discount_memory.json"
          else
            if [[ ! -f runtime_data/price_memory.json ]]; then
              echo "Skipping Koofr upload: runtime_data/price_memory.json not found."
              exit 0
            fi

            rclone copyto runtime_data/price_memory.json "koofr:${KOOFR_PATH}/price_memory.json"
          fi

      - name: Extract primary result
        id: extract
        shell: bash
        run: |
          field_line="$(grep -m1 -E 'parsed_price:\s*[^ ]|\[watch_result\]\s*' run.log | sed 's/^[[:space:]]*//')"
          if [[ -z "$field_line" ]]; then
            field_line="watch_result: no primary result line found"
          fi

          parsed_value="$(echo "$field_line" | cut -d':' -f2- | xargs)"
          notification_text="$(grep '^\[item_message\] ' run.log | sed 's/^\[item_message\] //')"
          if [[ -z "$notification_text" ]]; then
            notification_text="$(grep '^\[watch_result\] ' run.log | sed 's/^\[watch_result\] //')"
          fi
          if [[ -z "$notification_text" ]]; then
            notification_text="$field_line"
          fi

          echo "parsed_price_field=$field_line" >> "$GITHUB_OUTPUT"
          echo "parsed_price_value=$parsed_value" >> "$GITHUB_OUTPUT"
          {
            echo "notification_text<<EOF"
            printf '%s\n' "$notification_text"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          {
            echo "## Watcher Result"
            echo ""
            echo "- Field: \`$field_line\`"
            echo "- Parsed value: \`$parsed_value\`"
            echo ""
            echo "### Item Messages"
            printf '%s\n' "$notification_text"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Print extracted field
        run: |
          echo "Found field: ${{ steps.extract.outputs.parsed_price_field }}"
          echo "Parsed value: ${{ steps.extract.outputs.parsed_price_value }}"

      - name: Notify Telegram
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NOTIFICATION_TEXT: ${{ steps.extract.outputs.notification_text }}
          JOB_STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          if [[ -z "$TELEGRAM_BOT_TOKEN" || -z "$TELEGRAM_CHAT_ID" ]]; then
            echo "Skipping Telegram notification: TELEGRAM_BOT_TOKEN or TELEGRAM_CHAT_ID is missing."
            exit 0
          fi

          if [[ -z "$NOTIFICATION_TEXT" ]]; then
            NOTIFICATION_TEXT="No item message generated."
          fi

          message=$'Price watcher run: '"$JOB_STATUS"$'\nRepo: ${{ github.repository }}'$'\n\n'"$NOTIFICATION_TEXT"$'\n\nRun: '"$RUN_URL"

          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${message}" > /dev/null
